# experiments/ml_blur.yaml
# Usage:  python run_ml.py --config experiments/ml_blur.yaml
#
# Condition keys are defined in src/noise.py DEGRADATIONS dict.
# Same keys work in both orbslam and ml configs.

name: ml_blur_v1

seed: 42

trajs:
  traj1: data/TUM_original/dataset-room1_512_16

conditions:
  - clean
  - blur_ks3
  - blur_ks7
  - blur_ks11
  - gauss_4sig
  - gauss_16sig
  - occlusion_progressive
  - blur_ks7_occlusion25